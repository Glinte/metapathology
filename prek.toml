default_stages = ["pre-commit"]
default_install_hook_types = ["pre-commit", "pre-push"]

[[repos]]
repo = "builtin"
hooks = [
    { id = "check-merge-conflict" },
    { id = "check-toml" },
    { id = "check-yaml" },
    { id = "end-of-file-fixer" },
    { id = "trailing-whitespace" },
]

[[repos]]
repo = "local"
hooks = [
    { id = "ruff-check", name = "ruff check", entry = "uv run --locked ruff check --fix --force-exclude", language = "system", types = ["python"], stages = ["pre-commit"] },
    { id = "ruff-format", name = "ruff format", entry = "uv run --locked ruff format --force-exclude", language = "system", types = ["python"], stages = ["pre-commit"] },
    { id = "pyrefly", name = "pyrefly", entry = "uv run --locked pyrefly check", language = "system", pass_filenames = false, stages = ["pre-push"] },
    { id = "pytest", name = "pytest", entry = "uv run --locked pytest", language = "system", pass_filenames = false, stages = ["pre-push"] },
]
