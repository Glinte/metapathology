name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actions-security:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Upload zizmor's SARIF results to GitHub code scanning.

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Analyze GitHub Actions
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7

  lint:
    name: Ruff
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.32"
          python-version: "3.14"
          enable-cache: true

      - name: Install project
        run: uv sync --locked --dev

      - name: Run Ruff
        run: uv run --locked ruff check .

      - name: Check formatting
        run: uv run --locked ruff format --check .

      - name: Check repository files
        run: uv run --locked prek run --all-files

  typecheck:
    name: Type checking
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.32"
          python-version: "3.14"
          enable-cache: true

      - name: Install project
        run: uv sync --locked --dev

      - name: Run basedpyright
        run: uv run --locked basedpyright --level warning

      - name: Run pyrefly
        run: uv run --locked pyrefly check

  build:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.32"
          python-version: "3.14"
          enable-cache: true

      - name: Build wheel and source distribution
        run: uv build

      - name: Test wheel in isolation
        run: |
          uv run --isolated --no-project --with ./dist/metapathology-*.whl python -c "from importlib.metadata import distribution; dist = distribution('metapathology'); assert dist.requires is None; assert any(str(path).endswith('metapathology/py.typed') for path in (dist.files or ()))"
          uv run --isolated --no-project --with ./dist/metapathology-*.whl python -m metapathology --help
          uv run --isolated --no-project --with ./dist/metapathology-*.whl metapathology --help

      - name: Test source distribution in isolation
        run: |
          uv run --isolated --no-project --with ./dist/metapathology-*.tar.gz python -c "from importlib.metadata import distribution; dist = distribution('metapathology'); assert dist.requires is None; assert any(str(path).endswith('metapathology/py.typed') for path in (dist.files or ()))"
          uv run --isolated --no-project --with ./dist/metapathology-*.tar.gz python -m metapathology --help
          uv run --isolated --no-project --with ./dist/metapathology-*.tar.gz metapathology --help

  pytest:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.13t"
          - "3.14"
          - "3.14t"
          - "3.15"
          - "3.15t"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.32"
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install project
        if: matrix.python-version != '3.13t'
        run: uv sync --locked --dev

      # Hypothesis 6.156.6 builds a Rust extension whose PyO3 version rejects
      # free-threaded CPython 3.13. The remaining suite still provides useful
      # compatibility coverage until Hypothesis supports that interpreter.
      - name: Install project without Hypothesis
        if: matrix.python-version == '3.13t'
        run: uv sync --locked --dev --no-install-package hypothesis

      - name: Run tests
        if: matrix.python-version != '3.13t'
        run: uv run --locked pytest

      - name: Run tests without Hypothesis
        if: matrix.python-version == '3.13t'
        run: >-
          uv run --locked --no-sync pytest
          --ignore=tests/analysis/test_spec_comparison.py
          --ignore=tests/monitoring/test_importer_cache.py
          --ignore=tests/monitoring/test_meta_path.py
          --ignore=tests/reporting/test_structured_report.py
          --ignore=tests/runtime/test_config.py
