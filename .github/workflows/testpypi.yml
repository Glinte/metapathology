name: Publish to TestPyPI

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: testpypi
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/metapathology/
    permissions:
      contents: read
      id-token: write # Authenticate to TestPyPI through GitHub OIDC.

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.32"
          python-version: "3.14"
          enable-cache: false

      - name: Build wheel and source distribution
        run: uv build

      - name: Test wheel in isolation
        run: uv run --isolated --no-project --with ./dist/metapathology-*.whl metapathology --help

      - name: Test source distribution in isolation
        run: uv run --isolated --no-project --with ./dist/metapathology-*.tar.gz metapathology --help

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
